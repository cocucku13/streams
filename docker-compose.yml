services:
  postgres:
    image: postgres:16
    container_name: dj-postgres
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: dj-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mediamtx:
    build:
      context: .
      dockerfile: infra/Dockerfile.mediamtx
    image: streams-mediamtx:local
    container_name: dj-mediamtx
    env_file:
      - ./.env
    ports:
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "9997:9997"
    volumes:
      - ./infra/mediamtx.yml:/mediamtx.yml
      - ./infra/stream_event_hook.py:/hooks/stream_event_hook.py

  backend:
    image: python:3.12-slim
    container_name: dj-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && python scripts/bootstrap_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - mediamtx

  frontend:
    image: node:22-alpine
    container_name: dj-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    env_file:
      - ./.env
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
