services:
  postgres:
    image: postgres:16
    container_name: dj-postgres
    environment:
      POSTGRES_DB: streams
      POSTGRES_USER: streams
      POSTGRES_PASSWORD: streams
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: dj-mediamtx
    ports:
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8189:8189/udp"
      - "9997:9997"
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml

  backend:
    image: python:3.12-slim
    container_name: dj-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "pip install -r requirements.txt && python scripts/bootstrap_db.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      APP_ENV: development
      DEBUG: "true"
      SECRET_KEY: local-dev-secret-change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: "10080"
      DATABASE_URL: postgresql+psycopg://streams:streams@postgres:5432/streams
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DB_AUTO_CREATE: "false"
      RTMP_BASE: rtmp://localhost:1935/live
      HLS_BASE: http://localhost:8888
      WHEP_BASE: http://localhost:8889
      HLS_PROBE_BASE: http://mediamtx:8888
      MEDIAMTX_CONTROL_URL: http://mediamtx:9997
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mediamtx

  frontend:
    image: node:22-alpine
    container_name: dj-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_WS_BASE: ws://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
